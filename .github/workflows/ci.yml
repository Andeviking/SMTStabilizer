name: Cross-Platform Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_REF: '2025.12.12'
      VCPKG_TRIPLET: x64-windows
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build via setup.py (Linux/macOS)
        if: runner.os != 'Windows'
        run: python3 setup.py

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Setup vcpkg for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --branch $env:VCPKG_REF --depth 1 https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP/vcpkg"
          & "$env:RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat"
          echo "VCPKG_ROOT=$env:RUNNER_TEMP/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache vcpkg installed packages
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/vcpkg/installed
            ${{ runner.temp }}/vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ env.VCPKG_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ env.VCPKG_TRIPLET }}-

      - name: Show vcpkg version
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" version

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install --triplet $env:VCPKG_TRIPLET

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DSMTSTABILIZER_USE_BUNDLED_STATIC_LIBS=OFF `
            -DSMTSTABILIZER_FORCE_FULLY_STATIC=OFF `
            -DVCPKG_TARGET_TRIPLET=$env:VCPKG_TRIPLET `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build --output-on-failure -C Release
